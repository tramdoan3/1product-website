<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Electronic Device</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            background: #f5f5f5;
        }

        header {
            background: #111;
            color: white;
            padding: 60px 20px;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
        }

        .buy-btn {
            display: inline-block;
            padding: 15px 30px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }

        .buy-btn:hover {
            background: #0056b3;
        }

        footer {
            margin-top: 40px;
            background: #222;
            color: white;
            padding: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1>My Electronic Device</h1>
    <p>Smart, Reliable, and Easy to Use</p>
</header>

<div class="container">
    <h2>$99.99</h2>

    <p>
        Replace this text with your product description.
    </p>

    <ul style="text-align:left;display:inline-block;">
        <li>Feature 1</li>
        <li>Feature 2</li>
        <li>Feature 3</li>
    </ul>

    <br><br>

    <a class="buy-btn" href="#">
        Buy Now
    </a>
</div>

<footer>
    © 2026 My Brand
</footer>

</body>
</html>
